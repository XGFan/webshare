when:
  branch: master
  event: push

steps:
  - name: test
    image: golang:1.26-alpine
    commands:
      # git needed for Go's -buildvcs stamping; alpine base lacks it.
      - apk add --no-cache git
      - go vet ./...
      - go test -timeout 3m ./...

  - name: build
    image: docker.test4x.com/xgfan/plugin-docker-buildx-check
    settings:
      repo: docker.test4x.com/xgfan/webshare
      registry: docker.test4x.com
      mirror: https://docker.test4x.com
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      mtu: 1450
      cache_from: docker.test4x.com/xgfan/webshare:cache
      cache_to: docker.test4x.com/xgfan/webshare:cache
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - echo "$KUBECONFIG_DATA" > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      # Apply manifest first so new env vars / container ports / the
      # MetalLB LoadBalancer Service for SOCKS5+HTTP are picked up before
      # the image roll. -n default guards against kubeconfigs whose
      # default namespace is something other than `default` — resources
      # in the manifest that omit a namespace would otherwise be created
      # in the wrong place and Traefik would see two ingresses.
      - kubectl apply -n default -f deploy/k8s.yaml
      - kubectl set image deployment/webshare webshare=docker.test4x.com/xgfan/webshare:$(echo $CI_COMMIT_SHA | cut -c1-8) -n default
      # Block until the new ReplicaSet is fully rolled out (or fail CI).
      - kubectl rollout status deployment/webshare -n default --timeout=180s
      - rm -f /tmp/kubeconfig
    environment:
      KUBECONFIG_DATA:
        from_secret: kubeconfig

  - name: notify-success
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: success

  - name: notify-failure
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: failure
    when:
      - status: [failure]
